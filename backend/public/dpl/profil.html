<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Profil DPL</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
    <link rel="stylesheet" href="../assets/css/responsive.css" />
    <link rel="stylesheet" href="../assets/css/profilDpl.css" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  </head>

  <body>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <div class="wrapper">
      <!-- SIDEBAR -->

      <aside class="sidebar" id="sidebar">
        <div class="logo-area">
          <img src="../assets/image/Logo UYM.jpg" class="logo-img" />

          <h3>KKN UYM</h3>

          <small>Monitoring Mahasiswa</small>
        </div>

        <ul>
          <li>
            <a href="dashboard.html">
              <i class="fa-solid fa-house"></i>
              Dashboard
            </a>
          </li>

          <li>
            <a href="monitoring.html">
              <i class="fa-solid fa-users-viewfinder"></i>
              Monitoring
            </a>
          </li>

          <li>
            <a href="penilaian.html">
              <i class="fa-solid fa-star"></i>
              Penilaian
            </a>
          </li>

          <li class="active">
            <a href="profil.html">
              <i class="fa-solid fa-user"></i>
              Profil
            </a>
          </li>
        </ul>
      </aside>

      <!-- MAIN -->

      <main class="main">
        <!-- NAVBAR -->

        <div class="navbar">
          <div class="navbar-left">
            <button id="menuToggle" class="menu-toggle">
              <i class="fa-solid fa-bars"></i>
            </button>

            <div>
              <h2>Profil DPL</h2>
              <small>Kelola informasi akun</small>
            </div>
          </div>

          <div class="navbar-right">
            <span id="namaUser"></span>

            <button class="btn btn-danger" onclick="logout()">Logout</button>
          </div>
        </div>

        <!-- CONTENT -->

        <div class="content">
          <div class="row">
            <!-- CARD PROFIL -->

            <div class="col-lg-4 mb-4">
              <div class="card shadow-sm card-profile">
                <div class="card-body text-center">
                  <img src="../assets/image/default-user.png" id="fotoProfile" class="profile-avatar" />

                  <h4 id="profileNama" class="mt-3">-</h4>

                  <p id="profileEmail" class="text-muted mb-2">-</p>

                  <span id="profileRole" class="badge bg-primary mb-3"> DPL </span>

                  <hr />

                  <div class="profile-info">
                    <h6>Bergabung</h6>

                    <span id="profileCreated">-</span>
                  </div>

                  <div class="upload-section">

                        <input
                            type="file"
                            id="fotoInput"
                            class="form-control mb-3">

                        <button
                            class="btn btn-primary"
                            id="btnUploadFoto">

                            <i class="fa-solid fa-camera"></i>
                            Upload Foto

                        </button>

                    </div>

                    Upload Foto
                  </button>
                </div>
              </div>
            </div>

            <!-- FORM -->

            <div class="col-lg-8">
              <div class="card shadow-sm">
                <div class="card-header-custom">
                  <h3>
                    <i class="fa-solid fa-user-gear"></i>

                    Edit Profil
                  </h3>
                </div>

                <div class="card-body">
                  <div class="mb-3">
                    <label class="form-label"> Nama Lengkap </label>

                    <input type="text" class="form-control" id="nama" />
                  </div>

                  <div class="mb-3">
                    <label class="form-label"> Email </label>

                    <input type="email" class="form-control" id="email" />
                  </div>

                  <div class="mb-3">
                    <label class="form-label"> Password Baru </label>

                    <input type="password" class="form-control" id="password" placeholder="Kosongkan jika tidak ingin mengganti password" />
                  </div>

                  <div class="mb-3">
                    <label class="form-label"> Konfirmasi Password </label>

                    <input type="password" class="form-control" id="konfirmasiPassword" />
                  </div>

                  <button class="btn btn-primary" id="btnSimpan">
                    <i class="fa-solid fa-floppy-disk"></i>

                    Simpan Perubahan
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- LOADING -->

    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-content">
        <div class="spinner-border text-primary"></div>

        <p class="mt-3">Memuat data...</p>
      </div>
    </div>

    <!-- TOAST -->

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
      <div id="liveToast" class="toast text-bg-success border-0">
        <div class="d-flex">
          <div class="toast-body" id="toastMessage">Berhasil</div>

          <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/api.js"></script>

    <script src="../assets/js/dpl-auth.js"></script>

    <script src="../assets/js/sidebar.js"></script>

    <script src="../assets/js/profilDpl.js"></script>
  </body>
</html>
